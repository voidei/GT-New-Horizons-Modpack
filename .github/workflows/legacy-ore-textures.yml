name: Compress Legacy Ore Textures

on:
  push:
    branches: [ master ]
    paths: [ raw/legacy-ore-textures/** ]
  workflow_dispatch: { }

jobs:
  textures:
    name: Compress Legacy Ore Textures
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Compress Legacy Ore Textures
        run: python .github/scripts/compress.py legacy-ore-textures "resourcepacks/Legacy Ore Textures.zip"
      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          title: Compress Legacy Ore Textures
          body: Automated changes by Compress Legacy Ore Textures workflow.
          commit-message: Compress Legacy Ore Textures
          delete-branch: true
          branch: legacy-ore-textures/patch
